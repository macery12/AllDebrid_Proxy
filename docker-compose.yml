# Reusable storage bind-mount.  Override STORAGE_PATH in .env to change the host path.
x-storage-vol: &storage-vol
  - ${STORAGE_PATH:-/srv/storage}:/srv/storage

services:
  db:
    image: postgres:15
    container_name: proxy_db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: proxy_redis
    networks:
      - backend
    restart: unless-stopped

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: proxy_migrations
    command: ["alembic", "upgrade", "head"]
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: "no"
    user: "1000:1000"
    volumes: *storage-vol

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: proxy_api
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes: *storage-vol
    ports:
      - "${API_PORT:-9731}:8080"
    networks:
      - backend
      - frontend
    restart: unless-stopped
    user: "1000:1000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: proxy_worker
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes: *storage-vol
    networks:
      - backend
    restart: unless-stopped
    user: "1000:1000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: proxy_frontend
    ports:
      - "${FRONTEND_PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      - api
    volumes: *storage-vol
    networks:
      - frontend
    restart: unless-stopped
    user: "1000:1000"

  aria2:
    image: p3terx/aria2-pro:latest
    container_name: proxy_aria2
    restart: unless-stopped
    environment:
      - PUID=1000         # set to your host user's UID (`id -u`)
      - PGID=1000         # set to your host user's GID (`id -g`)
      - UMASK_SET=022
      - TZ=UTC
      - RPC_SECRET=${ARIA2_RPC_SECRET:-change-me}
      - RPC_PORT=16800
    volumes: *storage-vol
    ports:
      - "${ARIA2_RPC_PORT:-16800}:16800"
    networks:
      - backend

networks:
  backend:
  frontend:

volumes:
  db_data:
